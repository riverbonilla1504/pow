name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── detectar qué cambió ────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      nginx:     ${{ steps.f.outputs.nginx }}
      api:       ${{ steps.f.outputs.api }}
      dashboard: ${{ steps.f.outputs.dashboard }}
      workers:   ${{ steps.f.outputs.workers }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            nginx:
              - 'ec2-nginx/**'
            api:
              - 'ec2-api-orders/**'
            dashboard:
              - 'ec2-dashboard/**'
            workers:
              - 'ec2-workers/**'

  # ─── nginx (bastion) ────────────────────────────────────────────────────────
  deploy-nginx:
    needs: changes
    if: needs.changes.outputs.nginx == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << 'EOF'
          Host bastion
            HostName 52.21.124.113
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy nginx
        run: |
          ssh bastion "set -e &&
            cd /home/ubuntu/pow &&
            git fetch origin main &&
            git reset --hard origin/main &&
            sudo cp ec2-nginx/sites-available/ecommerce /etc/nginx/sites-available/ecommerce &&
            sudo nginx -t &&
            sudo systemctl reload nginx &&
            echo 'nginx desplegado'"

  # ─── API de órdenes (10.0.2.160) ────────────────────────────────────────────
  deploy-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << 'EOF'
          Host bastion
            HostName 52.21.124.113
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          Host api
            HostName 10.0.2.160
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyJump bastion
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy API
        run: |
          ssh api "set -e &&
            cd /home/ubuntu/pow &&
            git fetch origin main &&
            git reset --hard origin/main &&
            cd ec2-api-orders &&
            npm install --omit=dev &&
            pm2 restart orders-api &&
            pm2 save &&
            echo 'orders-api desplegado'"

  # ─── Next.js dashboard (10.0.2.160:3001) ────────────────────────────────────
  # Depende de deploy-api para evitar race condition en git pull/reset sobre el mismo servidor
  deploy-dashboard:
    needs: [changes, deploy-api]
    if: >
      always() &&
      needs.changes.outputs.dashboard == 'true' &&
      (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << 'EOF'
          Host bastion
            HostName 52.21.124.113
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          Host api
            HostName 10.0.2.160
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyJump bastion
          EOF
          chmod 600 ~/.ssh/config

      - name: Build y deploy dashboard
        run: |
          ssh -o ServerAliveInterval=30 api "set -e &&
            cd /home/ubuntu/pow &&
            git fetch origin main &&
            git reset --hard origin/main &&
            cd ec2-dashboard &&
            npm install &&
            npm run build &&
            pm2 restart dashboard &&
            pm2 save &&
            echo 'dashboard desplegado'"

  # ─── Workers de notificación (10.0.2.250) ───────────────────────────────────
  deploy-workers:
    needs: changes
    if: needs.changes.outputs.workers == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << 'EOF'
          Host bastion
            HostName 52.21.124.113
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          Host workers
            HostName 10.0.2.250
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyJump bastion
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy workers
        run: |
          ssh workers "set -e &&
            cd /home/ubuntu/pow &&
            git fetch origin main &&
            git reset --hard origin/main &&
            cd ec2-workers &&
            npm install --omit=dev &&
            pm2 restart email-worker sms-worker &&
            pm2 save &&
            echo 'workers desplegados'"
