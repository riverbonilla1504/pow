#!/usr/sbin/nft -f
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        iif lo accept
        ct state established,related accept

        # SSH from nginx (bastion) only
        ip saddr 10.0.1.192 tcp dport 22 accept

        # AMQP from API and Workers
        ip saddr 10.0.2.160 tcp dport 5672 accept
        ip saddr 10.0.2.250 tcp dport 5672 accept

        # Management UI from API (for admin dashboard proxy)
        ip saddr 10.0.2.160 tcp dport 15672 accept
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }
}
